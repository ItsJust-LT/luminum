# Production: use images from GHCR (built by GitHub Actions)
# Bind app ports to 127.0.0.1 so only the reverse proxy (Caddy) on the host can reach them.
# On server: docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luminum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminum_internal}
      POSTGRES_DB: ${POSTGRES_DB:-luminum}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Don't expose 5432 publicly in prod unless needed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luminum} -d ${POSTGRES_DB:-luminum}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-api:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL}
      API_WS_URL: ${API_WS_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-luminum}:${POSTGRES_PASSWORD:-luminum_internal}@postgres:5432/${POSTGRES_DB:-luminum}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      PAYSTACK_SECRET: ${PAYSTACK_SECRET:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    env_file: .env
    ports:
      - "127.0.0.1:4000:4000"

  dashboard:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-dashboard:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_URL: https://api.luminum.agency
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_ANALYTICS_URL: ${NEXT_PUBLIC_ANALYTICS_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"

  analytics:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-analytics:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-luminum}:${POSTGRES_PASSWORD:-luminum_internal}@postgres:5432/${POSTGRES_DB:-luminum}
      API_URL: http://api:4000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      PORT: 8080
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
  redis_data:
