# Production: use images from GHCR (built by GitHub Actions)
# Bind app ports to 127.0.0.1 so only the reverse proxy (Caddy) on the host can reach them.
# On server: docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luminum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminum_internal}
      POSTGRES_DB: ${POSTGRES_DB:-luminum}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Don't expose 5432 publicly in prod unless needed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luminum} -d ${POSTGRES_DB:-luminum}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-luminum}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-luminum_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  api:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-api:latest
    restart: unless-stopped
    # Chromium needs shared memory; default 64MB often causes "socket hang up" / crashes on WhatsApp Web
    shm_size: "1gb"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      NODE_ENV: production
      PORT: 4000
      CHROMIUM_PATH: /usr/bin/chromium
      APP_URL: ${APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      API_URL: ${API_URL:-https://api.luminum.agency}
      API_WS_URL: ${API_WS_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-luminum}:${POSTGRES_PASSWORD:-luminum_internal}@postgres:5432/${POSTGRES_DB:-luminum}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      # Server public IPv4 — branded custom-domain A record checks; set in .env on the host
      MAIL_SEND_IP: ${MAIL_SEND_IP:-}
      EMAIL_SYSTEM_ENABLED: ${EMAIL_SYSTEM_ENABLED:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # 64 hex chars (openssl rand -hex 32); required to encrypt per-org Resend keys at rest
      LUMINUM_EMAIL_SECRETS_KEY: ${LUMINUM_EMAIL_SECRETS_KEY:-}
      PAYSTACK_SECRET: ${PAYSTACK_SECRET:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-luminum}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-luminum_minio_secret}
      S3_BUCKET: ${S3_BUCKET:-luminum-storage}
      S3_REGION: ${S3_REGION:-us-east-1}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    env_file: .env
    ports:
      - "127.0.0.1:4000:4000"
    # 502 from Caddy usually means nothing listening here — check `docker compose logs api`
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Lighthouse runs here (Chromium); keep separate from API so scans don’t block HTTP.
  audit-worker:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-api:latest
    restart: unless-stopped
    shm_size: "1gb"
    entrypoint: ["/bin/sh", "/app/docker/entrypoint-audit-worker.sh"]
    command: []
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      CHROMIUM_PATH: /usr/bin/chromium
      AUDIT_WORKER_CONCURRENCY: "1"
      AUDIT_JOB_LOCK_MS: "900000"
      AUDIT_LIGHTHOUSE_MAX_MS: "720000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-luminum}:${POSTGRES_PASSWORD:-luminum_internal}@postgres:5432/${POSTGRES_DB:-luminum}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
    env_file: .env

  dashboard:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-dashboard:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # Server-side proxy + middleware: INTERNAL_API_URL wins over .env API_URL (public hostname breaks DNS in-container).
      INTERNAL_API_URL: http://api:4000
      API_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.luminum.agency}
      NEXT_PUBLIC_ANALYTICS_URL: ${NEXT_PUBLIC_ANALYTICS_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"

  # Analytics (Go): tracking, forms, live count; calls API for live-update & form-notify
  analytics:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/your-org/luminum}-analytics:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-luminum}:${POSTGRES_PASSWORD:-luminum_internal}@postgres:5432/${POSTGRES_DB:-luminum}
      API_URL: http://api:4000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      PORT: 8080
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
  redis_data:
  minio_data:
