# Build and push images to GHCR on push to main; optional deploy to a server via SSH
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Avoid overlapping deploys that race on fixed container names on the same host.
  group: luminum-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-api: ${{ steps.meta-api.outputs.tags }}
      image-dashboard: ${{ steps.meta-dashboard.outputs.tags }}
      image-analytics: ${{ steps.meta-analytics.outputs.tags }}
      image-mail: ${{ steps.meta-mail.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-dashboard
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ vars.PROD_DASHBOARD_NEXT_PUBLIC_API_URL || 'https://api.luminum.agency' }}
            NEXT_PUBLIC_APP_URL=${{ vars.PROD_DASHBOARD_NEXT_PUBLIC_APP_URL || 'https://app.luminum.agency' }}
            NEXT_PUBLIC_ANALYTICS_URL=${{ vars.PROD_DASHBOARD_NEXT_PUBLIC_ANALYTICS_URL || 'https://analytics.luminum.agency' }}
            NEXT_PUBLIC_SERVER_IP=${{ vars.PROD_SERVER_IP || secrets.PROD_MAIL_SEND_IP }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.PROD_API_VAPID_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Analytics)
        id: meta-analytics
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-analytics
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Analytics
        uses: docker/build-push-action@v6
        with:
          context: ./apps/analytics
          file: ./apps/analytics/Dockerfile
          push: true
          tags: ${{ steps.meta-analytics.outputs.tags }}
          labels: ${{ steps.meta-analytics.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Mail)
        id: meta-mail
        if: hashFiles('apps/mail/Dockerfile') != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-mail
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Mail
        if: hashFiles('apps/mail/Dockerfile') != ''
        uses: docker/build-push-action@v6
        with:
          context: ./apps/mail
          file: ./apps/mail/Dockerfile
          push: true
          tags: ${{ steps.meta-mail.outputs.tags }}
          labels: ${{ steps.meta-mail.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from PROD_* secrets and variables
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PREFIX="${{ vars.PROD_REGISTRY_IMAGE_PREFIX }}"
          [ -z "$PREFIX" ] && PREFIX="ghcr.io/${OWNER_LOWER}/luminum"
          PREFIX=$(echo "$PREFIX" | tr '[:upper:]' '[:lower:]')
          PG_PASS="${{ secrets.PROD_POSTGRES_PASSWORD }}"
          [ -z "$PG_PASS" ] && PG_PASS="luminum_internal"
          escape_multiline_env() {
            # Docker Compose env_file parser is strict: it cannot read values with literal newlines.
            # Convert real newlines in secret values into literal "\n" so the .env file stays valid.
            printf '%s' "$1" | sed ':a;N;$!ba;s/\r//g;s/\n/\\n/g'
          }
          MAIL_DKIM_PRIVATE_KEY_ESCAPED="$(escape_multiline_env "${{ secrets.PROD_MAIL_DKIM_PRIVATE_KEY }}")"
          VAPID_PUBLIC_KEY_ESCAPED="$(escape_multiline_env "${{ secrets.PROD_API_VAPID_PUBLIC_KEY }}")"
          VAPID_PRIVATE_KEY_ESCAPED="$(escape_multiline_env "${{ secrets.PROD_API_VAPID_PRIVATE_KEY }}")"
          {
            echo "REGISTRY_IMAGE_PREFIX=$PREFIX"
            echo "POSTGRES_USER=${{ vars.PROD_POSTGRES_USER || 'luminum' }}"
            echo "POSTGRES_PASSWORD=$PG_PASS"
            echo "POSTGRES_DB=${{ vars.PROD_POSTGRES_DB || 'luminum' }}"
            echo "APP_URL=${{ vars.PROD_APP_URL }}"
            echo "CORS_ORIGINS=${{ vars.PROD_CORS_ORIGINS }}"
            echo "API_URL=${{ vars.PROD_API_URL || 'https://api.luminum.agency' }}"
            echo "API_WS_URL=${{ vars.PROD_API_WS_URL }}"
            echo "NEXT_PUBLIC_APP_URL=${{ vars.PROD_DASHBOARD_NEXT_PUBLIC_APP_URL }}"
            echo "NEXT_PUBLIC_API_URL=${{ vars.PROD_DASHBOARD_NEXT_PUBLIC_API_URL || 'https://api.luminum.agency' }}"
            echo "NEXT_PUBLIC_ANALYTICS_URL=${{ vars.PROD_DASHBOARD_NEXT_PUBLIC_ANALYTICS_URL }}"
            echo "BETTER_AUTH_SECRET=${{ secrets.PROD_API_BETTER_AUTH_SECRET }}"
            echo "WEBHOOK_SECRET=${{ secrets.PROD_API_WEBHOOK_SECRET }}"
            echo "MAIL_APP_URL=${{ vars.PROD_MAIL_APP_URL || 'http://mail:8025' }}"
            echo "MAIL_FROM_DEFAULT=${{ vars.PROD_MAIL_FROM_DEFAULT || '' }}"
            echo "EMAIL_SYSTEM_ENABLED=${{ vars.PROD_EMAIL_SYSTEM_ENABLED || 'true' }}"
            echo "MAIL_SEND_IP=${{ secrets.PROD_MAIL_SEND_IP }}"
            echo "SERVER_IP=${{ vars.PROD_SERVER_IP }}"
            echo "MAIL_MX_DOMAIN=${{ secrets.PROD_MAIL_MX_DOMAIN }}"
            echo "MAIL_MX_HOST=${{ secrets.PROD_MAIL_MX_HOST }}"
            echo "MAIL_SEND_HOST=${{ secrets.PROD_MAIL_SEND_HOST }}"
            echo "MAIL_DKIM_PRIVATE_KEY=$MAIL_DKIM_PRIVATE_KEY_ESCAPED"
            echo "LOG_INGEST_SECRET=${{ secrets.PROD_LOG_INGEST_SECRET }}"
            echo "VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY_ESCAPED"
            echo "VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY_ESCAPED"
            echo "RESEND_API_KEY=${{ secrets.PROD_API_RESEND_API_KEY }}"
            echo "PAYSTACK_SECRET=${{ secrets.PROD_API_PAYSTACK_SECRET }}"
            echo "S3_ENDPOINT=${{ secrets.PROD_API_S3_ENDPOINT }}"
            echo "S3_ACCESS_KEY_ID=${{ secrets.PROD_API_S3_ACCESS_KEY_ID }}"
            echo "S3_SECRET_ACCESS_KEY=${{ secrets.PROD_API_S3_SECRET_ACCESS_KEY }}"
            echo "S3_BUCKET=${{ vars.PROD_API_S3_BUCKET || 'luminum-storage' }}"
            echo "S3_REGION=${{ vars.PROD_API_S3_REGION || 'us-east-1' }}"
            echo "GOOGLE_CLIENT_ID=${{ secrets.PROD_API_GOOGLE_CLIENT_ID }}"
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.PROD_API_GOOGLE_CLIENT_SECRET }}"
            # Amazon SES (outbound + identity; inbound via receipt rule → Lambda → API webhook)
            echo "AWS_REGION=${{ vars.PROD_API_SES_REGION || vars.PROD_API_S3_REGION || 'us-east-1' }}"
            echo "AWS_ACCESS_KEY_ID=${{ secrets.PROD_API_SES_ACCESS_KEY_ID }}"
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.PROD_API_SES_SECRET_ACCESS_KEY }}"
            echo "SES_CONFIGURATION_SET=${{ vars.PROD_API_SES_CONFIGURATION_SET || '' }}"
            echo "EMAIL_SEND_SES_ORG_IDS=${{ vars.PROD_EMAIL_SEND_SES_ORG_IDS || '' }}"
            echo "SES_LAMBDA_INBOUND_SECRET=${{ secrets.PROD_SES_LAMBDA_INBOUND_SECRET }}"
            echo "SES_INBOUND_LAMBDA_ARN=${{ vars.PROD_SES_INBOUND_LAMBDA_ARN || '' }}"
            echo "SES_RECEIPT_RULE_SET_NAME=${{ vars.PROD_SES_RECEIPT_RULE_SET_NAME || 'luminum-ses-inbound' }}"
            echo "SES_RECEIPT_RULE_NAME=${{ vars.PROD_SES_RECEIPT_RULE_NAME || 'luminum-forward-to-lambda' }}"
            echo "EMAIL_INBOUND_MODE=${{ vars.PROD_EMAIL_INBOUND_MODE || 'ses' }}"
            echo "EMAIL_DNS_PERIODIC_CHECK_MS=${{ vars.PROD_EMAIL_DNS_PERIODIC_CHECK_MS || '' }}"
          } > .env

      - name: Copy .env, docker-compose.prod.yml and Caddyfile to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: ".env,docker-compose.prod.yml,deploy/caddy/Caddyfile"
          target: ${{ vars.DEPLOY_PATH || '~/luminum' }}

      - name: Bootstrap server (Docker, Caddy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/snap/bin:$PATH"
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '$HOME/luminum' }}"
            # Expand leading ~ if present
            [ "${DEPLOY_PATH:0:1}" = "~" ] && DEPLOY_PATH="$HOME${DEPLOY_PATH:1}"

            # 1. Docker
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq ca-certificates curl
              sudo install -m 0755 -d /etc/apt/keyrings
              sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              sudo chmod a+r /etc/apt/keyrings/docker.asc
              . /etc/os-release 2>/dev/null || true
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME:-jammy} stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker "$(whoami)" 2>/dev/null || true
            else
              echo "Docker already installed."
            fi

            # 2. Docker Compose (plugin)
            if ! (docker compose version 2>/dev/null || sudo docker compose version 2>/dev/null); then
              echo "Installing Docker Compose plugin..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker-compose-plugin 2>/dev/null || true
            else
              echo "Docker Compose already available."
            fi

            # 3. Caddy
            if ! command -v caddy &>/dev/null; then
              echo "Installing Caddy..."
              sudo apt-get install -y -qq debian-keyring debian-archive-keyring apt-transport-https curl 2>/dev/null || sudo apt-get update -qq
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list > /dev/null
              sudo apt-get update -qq && sudo apt-get install -y -qq caddy
              sudo systemctl enable caddy
            else
              echo "Caddy already installed."
            fi

            # 4. Caddyfile (SCP may put at deploy/caddy/Caddyfile or Caddyfile under DEPLOY_PATH)
            for CADDYFILE_SRC in "$DEPLOY_PATH/deploy/caddy/Caddyfile" "$DEPLOY_PATH/Caddyfile"; do
              if [ -f "$CADDYFILE_SRC" ]; then
                sudo cp "$CADDYFILE_SRC" /etc/caddy/Caddyfile
                sudo systemctl reload caddy 2>/dev/null || sudo systemctl start caddy
                echo "Caddy configured and reloaded from $CADDYFILE_SRC."
                break
              fi
            done

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/snap/bin:$PATH"
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc
            cd ${{ vars.DEPLOY_PATH || '~/luminum' }}
            [ "$(whoami)" = "root" ] && DOCKER="docker" || DOCKER="sudo docker"
            echo "${{ secrets.PROD_SERVER_GHCR_TOKEN }}" | $DOCKER login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin
            $DOCKER compose -f docker-compose.prod.yml pull
            # Prevent container-name conflicts if old project names / orphaned containers exist
            $DOCKER compose -f docker-compose.prod.yml down --remove-orphans || true
            $DOCKER compose -f docker-compose.prod.yml up -d --force-recreate
            $DOCKER image prune -f
            # Build CLI inside the API container so `luminum` wrapper works
            $DOCKER exec luminum-api-1 sh -c 'cd /app/packages/cli && npx tsc' || echo "CLI build skipped (container may still be starting)"
        env:
          REGISTRY: ghcr.io
