# Build and push images to GHCR on push to main; optional deploy to a server via SSH
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-api: ${{ steps.meta-api.outputs.tags }}
      image-dashboard: ${{ steps.meta-dashboard.outputs.tags }}
      image-analytics: ${{ steps.meta-analytics.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-dashboard
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          build-args: |
            API_URL=${{ vars.API_URL || 'http://api:4000' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_ANALYTICS_URL=${{ vars.NEXT_PUBLIC_ANALYTICS_URL || 'http://localhost:8080' }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Analytics)
        id: meta-analytics
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/luminum-analytics
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Analytics
        uses: docker/build-push-action@v6
        with:
          context: ./apps/analytics
          file: ./apps/analytics/Dockerfile
          push: true
          tags: ${{ steps.meta-analytics.outputs.tags }}
          labels: ${{ steps.meta-analytics.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH || '~/luminum' }}
            echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          REGISTRY: ghcr.io
