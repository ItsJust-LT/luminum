# Daily trigger for scheduled Lighthouse audits (POST /api/cron/run-site-audits).
# Requires repository secrets: CRON_SECRET (same as production API CRON_SECRET).
# Optional variable PROD_API_URL (default https://api.luminum.agency).
name: Cron — daily site audits

on:
  schedule:
    # 06:30 UTC daily (~08:30 SAST); change as needed
    - cron: "30 6 * * *"
  workflow_dispatch: {}

jobs:
  run-site-audits:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/run-site-audits
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: ${{ vars.PROD_API_URL }}
        run: |
          set -e
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set in repository secrets. Add it (same value as production CRON_SECRET)."
            exit 1
          fi
          BASE="${API_URL:-https://api.luminum.agency}"
          BASE="${BASE%/}"
          echo "Calling ${BASE}/api/cron/run-site-audits"
          curl -fsS -X POST "${BASE}/api/cron/run-site-audits" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo ""
